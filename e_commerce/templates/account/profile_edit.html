{% extends "base.html" %}
{% load static %}

{% block style %}
<link rel="stylesheet" href="{% static "css/account/profile_edit.css" %}">
{% endblock style %}

{% block content %}
<div class="auth-page">
  <div class="card">

    <!-- Header -->
    <div class="card-head">
      <div class="avatar">
        <i class="fas fa-user"></i>
      </div>
      <div class="brand">Edit Profile</div>
      <p>Update your personal information below</p>
    </div>

    <form method="POST">
      {% csrf_token %}

      <div class="card-body">
        {{ profile_form.as_p }}
      </div>

      <div class="card-footer">
        <button type="submit" class="btn-submit">
          <i class="fas fa-floppy-disk"></i> Save Changes
        </button>

        <div class="divider">or</div>

        <p class="back-link">
          <a href="{% url 'profile' %}">
            <i class="fas fa-arrow-left"></i> Back to Profile
          </a>
        </p>
      </div>

    </form>
  </div>
</div>
{% endblock content %}
