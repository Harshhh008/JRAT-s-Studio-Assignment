{% extends "base.html" %}
{% load static %}

{% block style %}
<link rel="stylesheet" href="{% static 'css/account/register.css' %}">
{% endblock style %}

{% block content %}
<div class="auth-page">
  <div class="card">

    <div class="card-head">
      <div class="brand">JRat's<span></span></div>
      <p>Create your account to get started</p>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="card-body">
        {{ form.as_p }}
      </div>
      <div class="card-footer">
        <button type="submit" class="btn-submit">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
        <div class="divider">or</div>
        <p class="signin-link">
          Already have an account?
          <a href="{% url 'login' %}">Sign In</a>
        </p>
      </div>
    </form>

  </div>
</div>
{% endblock content %}
