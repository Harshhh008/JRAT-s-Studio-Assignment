{% include "base.html" %}
{% block content %}
<style>
.dashboard-links {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
  margin-top: 20px;
  justify-content: center;
}
.dashboard-links a {
  text-decoration: none;
  background: #4CAF50;
  color: white;
  padding: 8px 15px;
  border-radius: 5px;
  font-weight: bold;
  transition: background 0.3s;
}
.dashboard-links a:hover {
  background: #45a049;
}
.dashboard-links a .count {
  background: white;
  color: #4CAF50;
  padding: 2px 8px;
  border-radius: 12px;
  margin-left: 5px;
  font-weight: normal;
}
</style>

<div class="dashboard-links">
  <a href="{% url 'dashboard_categories' %}">Categories <span class="count">{{ categories_count }}</span></a>
  <a href="{% url 'dashboard_products' %}">Products <span class="count">{{ products_count }}</span></a>
  <a href="{% url 'dashboard_users' %}">Users <span class="count">{{ users_count }}</span></a>
</div>
<hr>
{% endblock content %}
